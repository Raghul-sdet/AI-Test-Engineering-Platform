# --- UI and API Execution URLs ---
baseUrl=https://parabank.parasoft.com/parabank
uiBaseUrl=https://parabank.parasoft.com/parabank
apiBaseUrl=https://parabank.parasoft.com/parabank/services/bank

# --- Browser Configuration ---
browser=chrome
headless=true

# --- Execution Mode Configuration ---
# Valid values for execution.mode are 'local' or 'grid'
execution.mode=local
# Use 'http://selenium-hub:4444' when running inside Docker Compose
# Use 'http://localhost:4444' if running locally from IDE against Docker Grid
gridUrl=http://selenium-hub:4444

# Timeouts
implicitWait=10
explicitWait=15

# Database Configuration (H2 Embedded Database)
dbUrl=jdbc:h2:file:./target/automationdb;AUTO_SERVER=TRUE
dbUsername=sa
dbPassword=sa